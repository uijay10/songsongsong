<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 项目事件认领审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pending  { background-color: #fef3c7; color: #d97706; }
        .status-approved { background-color: #d1fae5; color: #059669; }
        .status-rejected { background-color: #fee2e2; color: #ef4444; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <header class="bg-white border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">项目事件认领管理后台</h1>
                    <p class="text-slate-500 text-sm">共 <span id="total-count" class="font-medium">0</span> 条申请</p>
                </div>
                <button onclick="refreshData()"
                        class="px-6 py-2.5 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 transition-colors">
                    刷新数据
                </button>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-8 py-6 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <div class="text-amber-600 text-sm font-medium">待审核</div>
                <div id="pending-count" class="text-4xl font-bold text-slate-800 mt-2">0</div>
            </div>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <div class="text-emerald-600 text-sm font-medium">已通过</div>
                <div id="approved-count" class="text-4xl font-bold text-slate-800 mt-2">0</div>
            </div>
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <div class="text-red-600 text-sm font-medium">已拒绝</div>
                <div id="rejected-count" class="text-4xl font-bold text-slate-800 mt-2">0</div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-8 pb-12">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
                <h2 class="text-xl font-semibold">认领申请列表</h2>
                <input id="search-input" type="text" placeholder="搜索项目名称或事件..."
                       class="px-5 py-2.5 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 w-full md:w-80">
            </div>

            <div id="claims-list" class="space-y-5"></div>
        </div>
    </div>

    <script>
        // 标准化数据结构，预留后端接口字段
        let claims = [
            {
                id: "claim_001",
                eventTitle: "Colosseum Frontier 黑客松",
                projectName: "Solana 中文社区",
                contact: "@solana_cn",
                reason: "希望作为社区方提供中文直播、开发者招募支持以及线下 Meetup 组织。",
                eventLink: "#",
                status: "pending",
                submitTime: "2026-04-01 14:30",
                // 预留后端字段
                reviewedBy: null,
                reviewedAt: null
            },
            {
                id: "claim_002",
                eventTitle: "Solana Accelerate USA",
                projectName: "Ocean Ventures",
                contact: "hello@ocean.ventures",
                reason: "希望作为赞助方参与线下活动，并提供投资人资源对接。",
                eventLink: "#",
                status: "approved",
                submitTime: "2026-03-28 09:15",
                reviewedBy: "admin",
                reviewedAt: "2026-03-28 11:00"
            }
        ];

        function getStatusClass(status) {
            if (status === 'pending') return 'status-pending';
            if (status === 'approved') return 'status-approved';
            return 'status-rejected';
        }

        function getStatusText(status) {
            if (status === 'pending') return '待审核';
            if (status === 'approved') return '已通过';
            return '已拒绝';
        }

        function updateStats() {
            document.getElementById('total-count').textContent = claims.length;
            document.getElementById('pending-count').textContent = claims.filter(c => c.status === 'pending').length;
            document.getElementById('approved-count').textContent = claims.filter(c => c.status === 'approved').length;
            document.getElementById('rejected-count').textContent = claims.filter(c => c.status === 'rejected').length;
        }

        function renderClaims(filteredClaims) {
            updateStats();
            const container = document.getElementById('claims-list');
            container.innerHTML = '';

            if (filteredClaims.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400">暂无匹配的申请</div>`;
                return;
            }

            filteredClaims.forEach(claim => {
                const html = `
                    <div id="card-${claim.id}" class="bg-white rounded-3xl p-7 shadow-sm border border-slate-100 transition-all duration-300">
                        <div class="flex justify-between items-start">
                            <div class="flex-1 min-w-0 pr-4">
                                <h3 class="font-semibold text-lg">${claim.eventTitle}</h3>
                                <p class="text-slate-600 mt-1">申请方：${claim.projectName}</p>
                                <p class="text-sm text-slate-500 mt-1">联系方式：${claim.contact}</p>
                                <p class="text-xs text-slate-400 mt-1">申请 ID：${claim.id}</p>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <span class="px-5 py-1.5 rounded-2xl text-sm font-medium ${getStatusClass(claim.status)}">
                                    ${getStatusText(claim.status)}
                                </span>
                                <p class="text-xs text-slate-400 mt-3">${claim.submitTime}</p>
                                ${claim.reviewedAt ? `<p class="text-xs text-slate-400 mt-1">审核于 ${claim.reviewedAt}</p>` : ''}
                            </div>
                        </div>

                        <div class="mt-5 text-sm text-slate-600 bg-slate-50 p-5 rounded-2xl leading-relaxed">
                            <strong>认领理由：</strong><br>
                            ${claim.reason}
                        </div>

                        <div class="mt-6 flex flex-wrap gap-3 items-center">
                            <a href="${claim.eventLink}" target="_blank"
                               class="text-blue-600 hover:underline text-sm">查看原事件 →</a>

                            ${claim.status === 'pending' ? `
                                <button onclick="approveClaim('${claim.id}')"
                                        class="px-6 py-2 bg-emerald-600 text-white text-sm rounded-2xl hover:bg-emerald-700 transition-colors">
                                    ✓ 通过
                                </button>
                                <button onclick="rejectClaim('${claim.id}')"
                                        class="px-6 py-2 bg-red-600 text-white text-sm rounded-2xl hover:bg-red-700 transition-colors">
                                    ✕ 拒绝
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function approveClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (!claim) return;
            claim.status = 'approved';
            claim.reviewedBy = 'admin';
            claim.reviewedAt = new Date().toLocaleString('zh-CN').replace(/\//g, '-').slice(0, 16);

            // TODO: await fetch('/api/claims/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'approved' }) });

            const card = document.getElementById('card-' + id);
            if (card) {
                card.style.opacity = '0.5';
                setTimeout(() => renderClaims(getFiltered()), 400);
            }
        }

        function rejectClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (!claim) return;
            claim.status = 'rejected';
            claim.reviewedBy = 'admin';
            claim.reviewedAt = new Date().toLocaleString('zh-CN').replace(/\//g, '-').slice(0, 16);

            // TODO: await fetch('/api/claims/' + id, { method: 'PATCH', body: JSON.stringify({ status: 'rejected' }) });

            const card = document.getElementById('card-' + id);
            if (card) {
                card.style.opacity = '0.5';
                setTimeout(() => renderClaims(getFiltered()), 400);
            }
        }

        function getFiltered() {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            if (!term) return claims;
            return claims.filter(c =>
                c.projectName.toLowerCase().includes(term) ||
                c.eventTitle.toLowerCase().includes(term)
            );
        }

        function refreshData() {
            // TODO: 替换为 fetch('/api/claims') 从 Supabase 拉取
            renderClaims(getFiltered());
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('input', () => {
                renderClaims(getFiltered());
            });
            renderClaims(claims);
        });
    </script>
</body>
</html>
