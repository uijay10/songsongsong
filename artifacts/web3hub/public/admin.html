<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 项目事件认领审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-pending  { background-color: #fef3c7; color: #d97706; }
        .status-approved { background-color: #d1fae5; color: #10b981; }
        .status-rejected { background-color: #fee2e2; color: #ef4444; }
        .claim-card { transition: all 0.3s ease; }
        .claim-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .stat-card-active { ring: 2px; outline: 2px solid #6366f1; outline-offset: 2px; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-anim { animation: slideUp 0.3s ease forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <header class="bg-white border-b sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-8 py-5 flex flex-wrap justify-between items-center gap-3">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">项目事件认领管理后台</h1>
                    <p class="text-slate-500 text-sm">共 <span id="total-count" class="font-medium">0</span> 条真实申请</p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button onclick="exportData()"   class="px-6 py-2.5 bg-slate-700 text-white rounded-2xl hover:bg-slate-800 transition-colors text-sm">导出 CSV</button>
                    <button onclick="batchApprove()" class="px-6 py-2.5 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 transition-colors text-sm">批量通过</button>
                    <button onclick="batchReject()"  class="px-6 py-2.5 bg-red-600 text-white rounded-2xl hover:bg-red-700 transition-colors text-sm">批量拒绝</button>
                    <button onclick="clearAllData()" class="px-6 py-2.5 bg-red-800 text-white rounded-2xl hover:bg-red-900 transition-colors text-sm">清空所有申请</button>
                </div>
            </div>
        </header>

        <!-- 统计卡片（可点击筛选，点击高亮） -->
        <div class="max-w-7xl mx-auto px-8 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div id="card-pending" onclick="filterByStatus('pending')"
                 class="bg-white rounded-3xl p-6 shadow-sm border cursor-pointer hover:shadow-md transition-all">
                <div class="text-amber-600 text-sm font-medium">待审核</div>
                <div id="pending-count" class="text-5xl font-bold text-slate-800 mt-3">0</div>
            </div>
            <div id="card-approved" onclick="filterByStatus('approved')"
                 class="bg-white rounded-3xl p-6 shadow-sm border cursor-pointer hover:shadow-md transition-all">
                <div class="text-emerald-600 text-sm font-medium">已通过</div>
                <div id="approved-count" class="text-5xl font-bold text-slate-800 mt-3">0</div>
            </div>
            <div id="card-rejected" onclick="filterByStatus('rejected')"
                 class="bg-white rounded-3xl p-6 shadow-sm border cursor-pointer hover:shadow-md transition-all">
                <div class="text-red-600 text-sm font-medium">已拒绝</div>
                <div id="rejected-count" class="text-5xl font-bold text-slate-800 mt-3">0</div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-8 pb-12">
            <div class="flex flex-wrap justify-between items-center mb-6 gap-3">
                <h2 class="text-xl font-semibold">认领申请列表</h2>
                <div class="flex gap-3 flex-wrap">
                    <button onclick="filterByStatus('all')"
                            class="px-4 py-2 border border-slate-300 rounded-2xl text-sm hover:bg-slate-50 transition-colors">显示全部</button>
                    <input id="search-input" type="text" placeholder="搜索项目名称或事件标题..."
                           class="w-full md:w-80 px-5 py-2.5 border border-slate-300 rounded-3xl focus:outline-none focus:border-blue-500 text-sm">
                </div>
            </div>
            <div id="claims-list" class="space-y-6"></div>
        </div>
    </div>

    <script>
        let claims = [];
        let activeFilter = 'all';

        function loadData() {
            const data = JSON.parse(localStorage.getItem('projectApplications') || '[]');
            claims = data.filter(item => item.id && String(item.id).startsWith('claim_'));
            applyFilter();
        }

        function saveToStorage() {
            localStorage.setItem('projectApplications', JSON.stringify(claims));
        }

        function getStatusHTML(status) {
            if (status === 'pending')  return `<span class="status-pending px-4 py-1 rounded-2xl text-xs font-semibold">待审核</span>`;
            if (status === 'approved') return `<span class="status-approved px-4 py-1 rounded-2xl text-xs font-semibold">已通过</span>`;
            return `<span class="status-rejected px-4 py-1 rounded-2xl text-xs font-semibold">已拒绝</span>`;
        }

        function updateStats() {
            document.getElementById('total-count').textContent   = claims.length;
            document.getElementById('pending-count').textContent  = claims.filter(c => c.status === 'pending').length;
            document.getElementById('approved-count').textContent = claims.filter(c => c.status === 'approved').length;
            document.getElementById('rejected-count').textContent = claims.filter(c => c.status === 'rejected').length;
        }

        function highlightCard(status) {
            ['pending', 'approved', 'rejected'].forEach(s => {
                const card = document.getElementById(`card-${s}`);
                if (s === status) {
                    card.style.outline = '2px solid #6366f1';
                    card.style.outlineOffset = '2px';
                } else {
                    card.style.outline = '';
                    card.style.outlineOffset = '';
                }
            });
        }

        function applyFilter() {
            updateStats();
            const filtered = activeFilter === 'all'
                ? claims
                : claims.filter(c => c.status === activeFilter);
            renderClaims(filtered);
        }

        function renderClaims(filtered) {
            const container = document.getElementById('claims-list');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-24">
                        <div class="text-6xl mb-4">📭</div>
                        <p class="text-slate-400 text-lg">暂无申请记录</p>
                        <p class="text-slate-300 text-sm mt-1">前端提交认领申请后将在此显示</p>
                    </div>`;
                return;
            }

            filtered.forEach(claim => {
                const html = `
                    <div class="claim-card bg-white rounded-3xl p-7 shadow-sm border border-slate-100">
                        <div class="flex flex-wrap justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex flex-wrap items-center gap-2 mb-2">
                                    <span class="text-xs bg-slate-100 px-3 py-1 rounded-full text-slate-400 font-mono">${claim.id}</span>
                                    ${getStatusHTML(claim.status)}
                                </div>
                                <h3 class="font-semibold text-lg text-slate-800">${claim.eventTitle}</h3>
                                <p class="mt-2 text-slate-700 text-sm"><strong>申请方：</strong>${claim.projectName}</p>
                                <p class="text-slate-600 text-sm"><strong>联系方式：</strong>${claim.contact}</p>
                                <div class="flex flex-wrap gap-4 mt-2">
                                    <p class="text-xs text-slate-400">提交时间：${claim.submitTime}</p>
                                    ${claim.reviewTime ? `<p class="text-xs text-slate-400">审核时间：${claim.reviewTime}</p>` : ''}
                                </div>
                            </div>
                        </div>

                        <div class="mt-5 bg-slate-50 p-5 rounded-2xl text-slate-700 text-sm leading-relaxed">
                            <strong>认领理由：</strong><br>${claim.reason}
                        </div>

                        ${claim.reviewNote ? `
                        <div class="mt-3 bg-blue-50 px-5 py-3 rounded-2xl text-blue-700 text-sm">
                            <strong>已有备注：</strong>${claim.reviewNote}
                        </div>` : ''}

                        <div class="mt-5">
                            <label class="block text-xs font-medium text-slate-500 mb-1">审核备注</label>
                            <textarea id="note-${claim.id}" rows="2"
                                      class="w-full px-4 py-3 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:border-blue-400 resize-none bg-slate-50"
                                      placeholder="填写审核意见（可选）...">${claim.reviewNote || ''}</textarea>
                        </div>

                        <div class="mt-4 flex flex-wrap gap-3">
                            ${claim.status === 'pending' ? `
                                <button onclick="approveClaim('${claim.id}')"
                                        class="px-6 py-2.5 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 transition-colors text-sm font-medium">✓ 通过申请</button>
                                <button onclick="rejectClaim('${claim.id}')"
                                        class="px-6 py-2.5 bg-red-600 text-white rounded-2xl hover:bg-red-700 transition-colors text-sm font-medium">✕ 拒绝申请</button>
                            ` : ''}
                            <button onclick="saveNote('${claim.id}')"
                                    class="px-6 py-2.5 border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors text-sm">保存备注</button>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function approveClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (!claim) return;
            claim.status = 'approved';
            claim.reviewTime = new Date().toLocaleString('zh-CN');
            saveToStorage();
            showToast(`✅ 已通过「${claim.projectName}」的申请`);
            applyFilter();
        }

        function rejectClaim(id) {
            const claim = claims.find(c => c.id === id);
            if (!claim) return;
            claim.status = 'rejected';
            claim.reviewTime = new Date().toLocaleString('zh-CN');
            saveToStorage();
            showToast(`❌ 已拒绝「${claim.projectName}」的申请`);
            applyFilter();
        }

        function saveNote(id) {
            const noteEl = document.getElementById(`note-${id}`);
            if (!noteEl) return;
            const claim = claims.find(c => c.id === id);
            if (claim) {
                claim.reviewNote = noteEl.value.trim();
                saveToStorage();
                showToast('✅ 审核备注已保存');
                applyFilter();
            }
        }

        function batchApprove() {
            const pending = claims.filter(c => c.status === 'pending');
            if (pending.length === 0) { showToast('没有待审核的申请'); return; }
            if (!confirm(`确定批量通过全部 ${pending.length} 条待审核申请吗？`)) return;
            pending.forEach(c => { c.status = 'approved'; c.reviewTime = new Date().toLocaleString('zh-CN'); });
            saveToStorage();
            showToast(`✅ 批量通过 ${pending.length} 条申请`);
            applyFilter();
        }

        function batchReject() {
            const pending = claims.filter(c => c.status === 'pending');
            if (pending.length === 0) { showToast('没有待审核的申请'); return; }
            if (!confirm(`确定批量拒绝全部 ${pending.length} 条待审核申请吗？`)) return;
            pending.forEach(c => { c.status = 'rejected'; c.reviewTime = new Date().toLocaleString('zh-CN'); });
            saveToStorage();
            showToast(`❌ 批量拒绝 ${pending.length} 条申请`);
            applyFilter();
        }

        function clearAllData() {
            if (!confirm('确定清空所有真实申请记录吗？此操作不可恢复！')) return;
            localStorage.removeItem('projectApplications');
            loadData();
            showToast('已清空所有申请记录');
        }

        function filterByStatus(status) {
            activeFilter = status;
            highlightCard(status);
            applyFilter();
        }

        function exportData() {
            if (claims.length === 0) { showToast('没有可导出的申请'); return; }
            const BOM = '\uFEFF';
            let csv = BOM + '申请ID,事件标题,项目名称,联系方式,状态,提交时间,审核时间,审核备注\n';
            const statusMap = { pending: '待审核', approved: '已通过', rejected: '已拒绝' };
            claims.forEach(c => {
                csv += [
                    `"${c.id}"`,
                    `"${(c.eventTitle  || '').replace(/"/g, '""')}"`,
                    `"${(c.projectName || '').replace(/"/g, '""')}"`,
                    `"${(c.contact    || '').replace(/"/g, '""')}"`,
                    `"${statusMap[c.status] || c.status}"`,
                    `"${c.submitTime  || ''}"`,
                    `"${c.reviewTime  || ''}"`,
                    `"${(c.reviewNote || '').replace(/"/g, '""')}"`
                ].join(',') + '\n';
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `认领申请_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
            showToast('✅ 申请列表已导出 CSV');
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-anim fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-4 rounded-2xl shadow-2xl text-sm z-[200]';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('input', e => {
                const term = e.target.value.toLowerCase().trim();
                const filtered = claims.filter(c =>
                    (c.projectName || '').toLowerCase().includes(term) ||
                    (c.eventTitle  || '').toLowerCase().includes(term)
                );
                renderClaims(filtered);
            });
            loadData();
        });
    </script>
</body>
</html>
