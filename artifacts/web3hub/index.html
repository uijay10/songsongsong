<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 项目事件聚合</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { content: [], theme: { extend: {} } };
    </script>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12 shadow-lg">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <h1 class="text-4xl font-bold">AI 项目事件聚合</h1>
            <p class="mt-3 text-blue-100 text-lg">自动抓取 · 轻量认领 · 需求匹配</p>
        </div>
    </header>

    <nav class="bg-white shadow sticky top-0 z-50 border-b">
        <div class="max-w-5xl mx-auto px-6 py-5 flex flex-wrap gap-3 justify-center" id="nav-bar"></div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-6 px-1">
            <span id="result-count" class="text-slate-500 text-sm font-medium">共 0 条事件</span>
            <span id="expire-info" class="text-xs text-slate-400"></span>
        </div>
        <div id="event-list" class="space-y-8"></div>
    </div>

    <script>
        let allEvents = [];
        let claimedEvents = JSON.parse(localStorage.getItem('claimedEvents') || '[]');

        const categories = [
            "全部", "测试网", "IDO/Launchpad", "预售", "融资公告",
            "空投", "招聘", "节点招募", "主网上线",
            "代币解锁", "交易所上线", "链上任务", "开发者专区"
        ];

        const RETENTION_DAYS = 60;

        function formatDate(dateStr) {
            if (!dateStr) return '日期待定';
            try {
                const date = new Date(dateStr);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();
                return `${year}年${month}月${day}日`;
            } catch (e) {
                return dateStr;
            }
        }

        function isWithinRetention(dateStr) {
            if (!dateStr) return true;
            try {
                const eventDate = new Date(dateStr);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const diffTime = eventDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays >= 0 && diffDays <= RETENTION_DAYS;
            } catch (e) {
                return true;
            }
        }

        function isClaimed(eventTitle) {
            return claimedEvents.includes(eventTitle);
        }

        function toggleClaim(eventTitle) {
            if (claimedEvents.includes(eventTitle)) {
                claimedEvents = claimedEvents.filter(title => title !== eventTitle);
            } else {
                claimedEvents.push(eventTitle);
            }
            localStorage.setItem('claimedEvents', JSON.stringify(claimedEvents));
            const currentCategory = document.querySelector('#nav-bar button.bg-blue-600')?.dataset.category || '全部';
            filterEvents(currentCategory);
        }

        function createNavBar() {
            const nav = document.getElementById('nav-bar');
            nav.innerHTML = '';

            categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.dataset.category = cat;
                btn.className = `px-6 py-2.5 rounded-full text-sm font-medium transition-all ${
                    index === 0 ? 'bg-blue-600 text-white shadow-md' : 'bg-white hover:bg-slate-100 border border-slate-200'
                }`;

                btn.addEventListener('click', () => {
                    document.querySelectorAll('#nav-bar button').forEach(b => {
                        b.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                        b.classList.add('bg-white', 'border', 'border-slate-200');
                    });
                    btn.classList.add('bg-blue-600', 'text-white', 'shadow-md');
                    btn.classList.remove('bg-white', 'border', 'border-slate-200');
                    filterEvents(cat);
                });

                nav.appendChild(btn);
            });
        }

        function filterEvents(selectedCategory) {
            const container = document.getElementById('event-list');
            container.innerHTML = '';

            let filtered = allEvents.filter(event => isWithinRetention(event.start_time));

            if (selectedCategory !== '全部') {
                filtered = filtered.filter(event => {
                    const cats = Array.isArray(event.category) ? event.category : [event.category || ''];
                    return cats.some(c => c === selectedCategory);
                });
            }

            document.getElementById('result-count').textContent = `共 ${filtered.length} 条事件`;
            document.getElementById('expire-info').textContent = `（已过滤过期活动，保留期 ${RETENTION_DAYS} 天）`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-slate-500">
                        暂无符合条件的活动<br>
                        <span class="text-xs">（当前栏目或保留期内没有匹配事件）</span>
                    </div>`;
                return;
            }

            renderEvents(filtered);
        }

        function renderEvents(events) {
            const container = document.getElementById('event-list');
            container.innerHTML = '';

            events.forEach(event => {
                const cats = Array.isArray(event.category) ? event.category : [event.category || '其他'];
                const mainCat = cats[0] || '其他';
                const desc = event.description || event.content || '暂无描述';
                const shortDesc = desc.length > 230 ? desc.substring(0, 227) + '...' : desc;

                let importanceHTML = '';
                if (event.importance) {
                    const imp = event.importance.toLowerCase();
                    if (imp.includes('high') || imp.includes('重要')) {
                        importanceHTML = `<span class="px-4 py-1 text-xs font-medium rounded-2xl bg-red-100 text-red-700">重要</span>`;
                    } else {
                        importanceHTML = `<span class="px-4 py-1 text-xs font-medium rounded-2xl bg-amber-100 text-amber-700">一般</span>`;
                    }
                }

                const claimed = isClaimed(event.title);
                const claimBtnText = claimed ? '已认领' : '我要认领';
                const claimBtnClass = claimed
                    ? 'bg-green-100 text-green-700 hover:bg-green-200'
                    : 'bg-blue-100 text-blue-700 hover:bg-blue-200';

                const cardHTML = `
                    <div class="bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 p-8 border border-slate-100">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex gap-3 flex-wrap">
                                <span class="px-5 py-1.5 bg-blue-100 text-blue-700 text-xs font-semibold rounded-3xl">${mainCat}</span>
                                ${importanceHTML}
                            </div>
                            <span class="text-slate-500 text-sm font-medium">${formatDate(event.start_time)}</span>
                        </div>

                        <h2 class="text-2xl font-semibold leading-tight mb-5 text-slate-900">
                            <a href="${event.source_url || '#'}" target="_blank"
                               class="hover:text-blue-600 transition-colors duration-200">
                                ${event.title}
                            </a>
                        </h2>

                        <p class="text-slate-600 leading-relaxed mb-7 text-[15.2px]">${shortDesc}</p>

                        <div class="flex flex-wrap gap-2 mb-8">
                            ${Array.isArray(event.tags) ? event.tags.map(tag =>
                                `<span class="px-4 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs rounded-3xl transition-colors">#${tag}</span>`
                            ).join('') : ''}
                        </div>

                        <div class="flex justify-between items-center pt-6 border-t border-slate-100">
                            <span class="text-slate-500">来源：${event.project_name || event.source || '未知'}</span>

                            <div class="flex gap-3">
                                <a href="${event.source_url || '#'}" target="_blank"
                                   class="px-5 py-2 text-sm text-blue-600 hover:text-blue-700 font-medium transition-colors">
                                    查看详情 →
                                </a>
                                <button onclick="toggleClaim('${event.title.replace(/'/g, "\\'")}')"
                                        class="px-6 py-2 text-sm font-medium rounded-2xl transition-all ${claimBtnClass}">
                                    ${claimBtnText}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        async function loadEvents() {
            try {
                const res = await fetch('/extraction_result.json');
                if (!res.ok) throw new Error('加载失败');

                allEvents = await res.json();
                console.log('加载成功，共', allEvents.length, '条');

                filterEvents('全部');
            } catch (err) {
                console.error(err);
                document.getElementById('event-list').innerHTML = `<div class="text-red-500 text-center py-20">数据加载失败</div>`;
            }
        }

        window.onload = () => {
            createNavBar();
            loadEvents();
        };
    </script>
</body>
</html>
