<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web3 Release - 最新机会</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background-color: #0f0f0f;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .event-card {
        background-color: #1a1a1a;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 15px;
        border-left: 5px solid #00ff9d;
      }
      .title {
        font-size: 1.3em;
        margin: 0 0 10px 0;
        color: #ffffff;
      }
      .project {
        color: #00ff9d;
        font-weight: bold;
      }
      .description {
        line-height: 1.6;
        margin: 12px 0;
      }
      .meta {
        display: flex;
        gap: 15px;
        font-size: 0.9em;
        color: #888;
      }
      .category {
        background-color: #333;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85em;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Web3 Release - 最新机会</h1>
      <p>AI 自动抓取 · 实时更新</p>
    </div>

    <div id="events-container">
      <!-- 事件会在这里动态显示 -->
    </div>

    <script>
      async function loadEvents() {
        try {
          const response = await fetch("extraction_result.json");
          const events = await response.json();

          const container = document.getElementById("events-container");
          container.innerHTML = "";

          if (events.length === 0) {
            container.innerHTML =
              '<p style="text-align:center; color:#888;">暂无事件数据，请先运行 crawler_test.py</p>';
            return;
          }

          events.forEach((event) => {
            const card = document.createElement("div");
            card.className = "event-card";
            card.innerHTML = `
            <h3 class="title">${event.title || "无标题"}</h3>
            <p class="project">${event.project_name || ""}</p>
            <p class="description">${event.description || ""}</p>
            <div class="meta">
              <span class="category">${Array.isArray(event.category) ? event.category.join("、") : event.category || "其他"}</span>
              <span>开始: ${event.start_time ? event.start_time.substring(0, 10) : "待定"}</span>
            </div>
          `;
            container.appendChild(card);
          });
        } catch (err) {
          document.getElementById("events-container").innerHTML =
            `<p style="color:red;">无法加载数据，请确保已运行 crawler_test.py 生成 extraction_result.json 文件</p>`;
        }
      }

      window.onload = loadEvents;
    </script>
  </body>
</html>
