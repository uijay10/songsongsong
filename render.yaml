# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Frontend static site (pnpm monorepo):
# - Root Directory in dashboard MUST stay empty (repo root) so pnpm-workspace.yaml applies.
# - Do NOT set rootDir to `frontend` alone — pnpm --filter needs the workspace root.
#
# @hookform/resolvers ships "prepare": "run-s build:src" (expects npm-run-all). That script
# runs during install and breaks CI with "run-s: not found". Use `pnpm install --ignore-scripts`;
# the published package already includes dist/ — no need to build from source.
#
# SKIP_INSTALL_DEPS: Render must not run a separate `npm install` before this buildCommand
# (would hit the same prepare / catalog issues).
#
# Frontend static: repo root for build; Vite outDir is frontend/dist (see frontend/vite.config.ts).
# Corepack + --ignore-scripts: global pnpm often missing; @hookform/resolvers prepare needs run-s.

services:
  - type: web
    name: songsongsong-qian-duan
    runtime: static
    # Omit rootDir (repo root). Must match Vite outDir: frontend/dist — full word "dist", not "dis".
    buildCommand: corepack enable && corepack prepare pnpm@10.12.0 --activate && pnpm install --no-frozen-lockfile --ignore-scripts && pnpm --filter @workspace/frontend exec vite build
    staticPublishPath: frontend/dist
    # SPA: unknown paths must serve index.html (also copy dist/404.html in Vite build as fallback).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SKIP_INSTALL_DEPS
        value: "true"
      # Vite inlines VITE_* at build time — must be set before `vite build`.
      - key: VITE_API_BASE_URL
        value: https://songsongsong-3.onrender.com

  - type: web
    name: web3-extract-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.example.com
