# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Frontend static site (pnpm monorepo):
# - Root Directory in dashboard MUST stay empty (repo root) so pnpm-workspace.yaml applies.
# - Do NOT set rootDir to `frontend` alone — pnpm --filter needs the workspace root.
#
# @hookform/resolvers ships "prepare": "run-s build:src" (expects npm-run-all). That script
# runs during install and breaks CI with "run-s: not found". Use `pnpm install --ignore-scripts`;
# the published package already includes dist/ — no need to build from source.
#
# SKIP_INSTALL_DEPS: Render must not run a separate `npm install` before this buildCommand
# (would hit the same prepare / catalog issues).

services:
  - type: web
    name: songsongsong-frontend
    runtime: static
    buildCommand: >-
      corepack enable && corepack install &&
      pnpm install --no-frozen-lockfile --ignore-scripts &&
      pnpm --filter @workspace/frontend exec tsc &&
      pnpm --filter @workspace/frontend exec vite build
    staticPublishPath: ./frontend/dist/public
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"

  - type: web
    name: web3-extract-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.example.com
